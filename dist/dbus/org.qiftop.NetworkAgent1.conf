<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only root may own the well-known name and run the service. -->
  <policy user="root">
    <allow own="org.qiftop.NetworkAgent1"/>
    <allow send_destination="org.qiftop.NetworkAgent1"/>
    <allow receive_sender="org.qiftop.NetworkAgent1"/>
  </policy>

  <!--
    Access is gated to the "netdev" group (the standard Debian/Ubuntu group
    for users permitted to view/manage network configuration). This closes
    two real issues against the previous "any local user" policy:

      1. CPU/netlink amplification DoS: any caller can pin the root agent
         at poll.min_interval_ms via SetDesiredIntervalMs, forcing 10 Hz
         conntrack dumps until the hint TTL expires.
      2. Information disclosure: GetConnections() returns the full conntrack
         table (every flow on the host, including other users' source ports
         and peer IPs). /proc/net/nf_conntrack is root-only on most distros;
         the agent must not demote that to "any local user".

    To grant a user access:
        sudo usermod -a -G netdev <username>
        # log out and back in (group membership is set at session start)

    If your distro lacks the "netdev" group, either create it
    (`sudo groupadd -r netdev`) or change the group="..." attributes below
    to a group that exists on your system.
  -->
  <policy group="netdev">
    <allow send_destination="org.qiftop.NetworkAgent1"/>
    <allow receive_sender="org.qiftop.NetworkAgent1"/>
  </policy>
</busconfig>
