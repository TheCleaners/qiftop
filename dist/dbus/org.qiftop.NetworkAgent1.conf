<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only root may own the well-known name. -->
  <policy user="root">
    <allow own="org.qiftop.NetworkAgent1"/>
  </policy>

  <!-- Any local user may talk to the service. The interface is read-only. -->
  <policy context="default">
    <allow send_destination="org.qiftop.NetworkAgent1"/>
    <allow receive_sender="org.qiftop.NetworkAgent1"/>
  </policy>
</busconfig>
