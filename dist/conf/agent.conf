# qiftop-agent configuration
# ---------------------------
#
# Path:   /etc/qiftop/agent.conf
# Format: INI (Qt QSettings IniFormat)
# Read:   Once at agent startup; restart to re-read:
#             systemctl restart qiftop-agent.service
#
# All keys are optional. Built-in defaults are shown. Out-of-range values are
# clamped with a warning; 0 disables idle timeout/schedule steps where noted.

[poll]
# Base polling interval while clients are active. Lower values make the UI more
# responsive but use more CPU. Valid range: 10 ms–1 h.
#
# Default: 1000
base_interval_ms=1000

# Minimum polling interval accepted from client cadence hints
# (SetDesiredIntervalMs). Valid range: 10 ms–1 h.
#
# Default: 100
min_interval_ms=100

[idle]
# Seconds after the last DBus method call before polling pauses. The agent wakes
# on the next method call. Valid range: 0–24 h; 0 disables pausing.
#
# Default: 60
timeout_secs=60

# Seconds before a client cadence hint expires. Clients should re-assert at
# about half this interval. Valid range: 0–24 h.
#
# Default: 10
hint_ttl_secs=10

# Adaptive slow-down schedule: three "<window_secs>:<interval_ms>" pairs.
# Elapsed time before window1 uses poll.base_interval_ms; window1→window2 uses
# interval1; window2→window3 uses interval2; at/after window3 polling pauses.
# The third interval is a sentinel and is ignored; keep window3 aligned with
# idle.timeout_secs. Windows: 0–24 h. Intervals: 10 ms–1 h, except the final
# sentinel may be 0.
#
# Default: 30:2000,45:5000,60:0
schedule=30:2000,45:5000,60:0

# ---------------------------------------------------------------------------
[process_details]
# Controls who may see privileged GetProcessDetails(pid) fields: exe, cwd and
# full command line. Bulk fields (pid, uid, comm, start time) are still returned
# to any authorised netdev-group caller.
#
# Values:
#   owner       — root or the target process owner only. (default)
#   permissive  — any authorised netdev caller.
#   restricted  — owner/root plus allow_users or allow_groups below.
#
# Default: owner
disclosure=owner

# Comma- or whitespace-separated allowlists, used only with
# disclosure=restricted. Users are login names; groups match primary or
# supplementary membership.
#
# Default: empty
#allow_users=
#allow_groups=
# Example:
#allow_groups=wheel
