# qiftop-agent configuration
# ---------------------------
#
# Path:   /etc/qiftop/agent.conf
# Format: INI (parsed by Qt's QSettings IniFormat)
# Read:   Once at agent startup. Re-read requires restarting the systemd unit:
#             systemctl restart qiftop-agent.service
#
# The agent operates in "adaptive idle" mode: it polls the kernel for stats
# at a fast cadence while clients are actively calling its DBus methods,
# then progressively slows the cadence down — and finally pauses polling
# entirely — once no client has called it for a while. The process itself
# stays running so DBus activation does not have to re-spawn it; the next
# incoming method call instantly restores fast polling.
#
# All keys below are optional. Built-in defaults are shown.

[poll]
# Base polling interval in milliseconds, used while clients are actively
# interacting with the agent. Lower values give snappier UI updates at the
# cost of more CPU. Reasonable range: 250–5000.
#
# Default: 1000
base_interval_ms=1000

# Absolute floor for polling cadence in milliseconds. Client-requested
# intervals (see SetDesiredIntervalMs DBus method) are clamped to this
# value to protect the kernel from runaway clients. Reasonable range:
# 50–1000.
#
# Default: 100
min_interval_ms=100

[idle]
# How long (in seconds) the agent will wait, after the last DBus method
# call from any client, before it stops polling entirely. While polling is
# paused the agent emits no signals and uses ~0 CPU; it wakes immediately
# on the next method call. Set to 0 to disable pausing (never stops).
#
# Default: 60
timeout_secs=60

# How long (in seconds) a client-requested cadence hint stays in effect
# after the client's last call to SetDesiredIntervalMs. Clients should
# re-assert their hint at roughly half this interval. Disconnected
# clients' hints expire silently, no NameOwnerChanged plumbing required.
#
# Default: 10
hint_ttl_secs=10

# Adaptive slow-down schedule. Three "<window_secs>:<interval_ms>" pairs
# separated by commas. Reading the schedule left-to-right:
#
#     <window1>:<interval1>,<window2>:<interval2>,<window3>:<unused>
#
#   * For elapsed time < window1   → use poll.base_interval_ms
#   * For window1 <= elapsed < window2 → use interval1
#   * For window2 <= elapsed < window3 → use interval2
#   * For elapsed >= window3       → pause polling (see idle.timeout_secs)
#
# The third interval is currently ignored (it's the "paused" sentinel)
# but the third window value is honoured and should match idle.timeout_secs.
#
# Default: 30:2000,45:5000,60:0
#   (= active for 30 s, then 2 s ticks until 45 s, then 5 s ticks until 60 s,
#    then paused.)
schedule=30:2000,45:5000,60:0

# ---------------------------------------------------------------------------
[process_details]
# Who may see the PRIVILEGED per-process fields — exe, cwd and the full
# command line — returned by the Connections.GetProcessDetails(pid) D-Bus
# method. The low-sensitivity bulk fields (pid, uid, comm, start time) are
# ALWAYS returned to any authorised (netdev-group) caller and are not
# affected by this setting.
#
# The root agent can read /proc/<pid>/exe and /proc/<pid>/cwd for processes
# owned by OTHER users (it holds CAP_SYS_PTRACE / CAP_DAC_READ_SEARCH for
# attribution), and /proc/<pid>/cmdline can carry secrets passed on the
# command line. This key controls how widely the agent re-discloses them:
#
#   owner       — root or the process's own owner only. (default)
#   permissive  — any authorised (netdev) caller. Restores the pre-0.2.1
#                 behaviour; every netdev member sees every process's
#                 exe/cwd/cmdline.
#   restricted  — root, the process owner, OR a caller listed in
#                 allow_users / a member of a group in allow_groups
#                 (e.g. wheel). Use this to grant cross-user visibility to
#                 a small set of administrators without opening it to the
#                 whole netdev group.
#
# Default: owner
disclosure=owner

# Comma- or whitespace-separated allowlists, consulted only when
# disclosure=restricted. allow_users matches login names; allow_groups
# matches primary OR supplementary group membership.
#
# Default: empty (so restricted == owner-only until you populate these)
#allow_users=
#allow_groups=wheel
