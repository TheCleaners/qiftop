name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

# Default to the minimum: read-only access to repository contents. CI doesn't
# write to issues, PRs, releases, packages, or anything else — the Release
# workflow does. Pinned per CodeQL `actions/missing-workflow-permissions`.
permissions:
  contents: read

# Cancel in-progress runs for the same branch/PR when a new commit is pushed.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test (ubuntu-24.04, ${{ matrix.build_type }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++ pkg-config \
            qt6-base-dev qt6-base-dev-tools \
            libgl1-mesa-dev \
            libnl-3-dev libnl-route-3-dev \
            libnetfilter-conntrack-dev \
            libncurses-dev \
            dbus-x11

      - name: Configure
        run: |
          # Debug builds enable ASan + UBSan on test targets only (production
          # binaries stay clean). Slower than vanilla Debug but catches
          # use-after-free, leaks, out-of-bounds, signed overflow, etc.
          if [ "${{ matrix.build_type }}" = "Debug" ]; then
            SAN="-DQIFTOP_TESTS_SANITIZE=address+undefined"
          else
            SAN="-DQIFTOP_TESTS_SANITIZE=OFF"
          fi
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DQIFTOP_BUILD_TESTS=ON \
            -DQIFTOP_AUTO_PACKAGE=OFF \
            $SAN

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        working-directory: build
        # Tests touch QSettings / autostart files; give them an HOME they
        # can write to. dbus-run-session keeps QtTest helpers that touch
        # the session bus happy.
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          export HOME="${RUNNER_TEMP}/home"
          mkdir -p "$HOME"
          dbus-run-session -- ctest --output-on-failure --no-tests=error

  containerized-build-and-test:
    # ubuntu-26.04 and fedora:44 don't ship as native GitHub Actions runners
    # (as of 2026-06). Run them inside containers on an ubuntu-24.04 host.
    # SWITCH TO NATIVE `runs-on: ubuntu-26.04` AS SOON AS THE RUNNER IMAGE
    # IS PUBLISHED — see https://github.com/actions/runner-images for status.
    name: Build & test (${{ matrix.image }}, ${{ matrix.build_type }})
    runs-on: ubuntu-24.04
    container:
      image: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        image: ["ubuntu:26.04", "fedora:44"]
        build_type: [Debug, Release]
        include:
          - image: "ubuntu:26.04"
            family: debian
          - image: "fedora:44"
            family: fedora
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies (debian family)
        if: matrix.family == 'debian'
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            cmake ninja-build g++ pkg-config \
            qt6-base-dev qt6-base-dev-tools \
            libgl1-mesa-dev \
            libnl-3-dev libnl-route-3-dev \
            libnetfilter-conntrack-dev \
            libncurses-dev \
            dbus-x11 ca-certificates

      - name: Install build dependencies (fedora family)
        if: matrix.family == 'fedora'
        run: |
          # Disable weak deps (the dnf analog of apt's --no-install-recommends)
          # so we don't drag in optional Qt multimedia/audio bloat
          # (e.g. pipewire-jack-audio-connection-kit) that this build never
          # uses. Fewer packages also means fewer requests, so fewer chances
          # to hit a dead Fedora mirror.
          #
          # The metalink occasionally hands out unreachable mirrors (curl 7
          # "could not connect" / HTTP 500), and dnf will otherwise sit there
          # retrying until the job's overall timeout cancels it. Cap per-server
          # connect time + minimum transfer rate so a bad mirror is abandoned
          # quickly, and retry the whole transaction a few times — each retry
          # re-resolves the metalink and usually lands on a healthy mirror.
          dnf_install() {
            dnf -y \
              --setopt=install_weak_deps=False \
              --setopt=fastestmirror=True \
              --setopt=retries=10 \
              --setopt=timeout=30 \
              --setopt=minrate=1k \
              install "$@"
          }
          pkgs="cmake ninja-build gcc-c++ pkgconf-pkg-config \
            qt6-qtbase-devel qt6-qtbase-private-devel \
            mesa-libGL-devel \
            libnl3-devel libnfnetlink-devel libnetfilter_conntrack-devel \
            ncurses-devel \
            dbus-daemon dbus-tools \
            libasan libubsan \
            shadow-utils"
          ok=0
          for attempt in 1 2 3; do
            if dnf_install $pkgs; then ok=1; break; fi
            echo "::warning::dnf install attempt ${attempt} failed (mirror?); " \
                 "cleaning metadata and retrying" >&2
            dnf clean all || true
            sleep $((attempt * 15))
          done
          [ "$ok" = 1 ] || { echo "::error::dnf install failed after 3 attempts"; exit 1; }

      - name: Configure
        run: |
          if [ "${{ matrix.build_type }}" = "Debug" ]; then
            SAN="-DQIFTOP_TESTS_SANITIZE=address+undefined"
          else
            SAN="-DQIFTOP_TESTS_SANITIZE=OFF"
          fi
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DQIFTOP_BUILD_TESTS=ON \
            -DQIFTOP_AUTO_PACKAGE=OFF \
            $SAN

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        working-directory: build
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          export HOME="${RUNNER_TEMP:-/tmp}/home"
          mkdir -p "$HOME"
          dbus-run-session -- ctest --output-on-failure --no-tests=error

  packaging-qa:
    name: Packaging QA (.deb lint + smoke install)
    runs-on: ubuntu-24.04
    needs: build-and-test
    steps:
      - uses: actions/checkout@v6

      - name: Install build + QA dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++ pkg-config \
            qt6-base-dev qt6-base-dev-tools \
            libgl1-mesa-dev \
            libnl-3-dev libnl-route-3-dev \
            libnetfilter-conntrack-dev \
            libncurses-dev \
            file fakeroot lintian desktop-file-utils appstream

      - name: Configure + build
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DQIFTOP_BUILD_TESTS=OFF \
            -DQIFTOP_AUTO_PACKAGE=OFF
          cmake --build build --parallel

      - name: Build libqiftop examples against the installed library
        # Each examples/* is a standalone find_package(qiftop) consumer. Build
        # them against a component-only install (libqiftop runtime + dev — NOT
        # the whole project, whose systemd unit installs to an absolute /lib
        # path needing root) so the public API + CMake package stay consumable
        # and the examples can't bit-rot.
        run: |
          P="$PWD/_install"
          cmake --install build --component libqiftop     --prefix "$P"
          cmake --install build --component libqiftop-dev --prefix "$P"
          for ex in examples/*/; do
            [ -f "$ex/CMakeLists.txt" ] || continue
            echo "::group::build $ex"
            cmake -S "$ex" -B "$ex/build" -G Ninja -DCMAKE_PREFIX_PATH="$P"
            cmake --build "$ex/build" --parallel
            echo "::endgroup::"
          done

      - name: Package (.deb)
        working-directory: build
        run: |
          cpack -G DEB
          ls -la *.deb

      - name: Validate desktop entries + AppStream metainfo
        # The .desktop files are the user-facing menu entries and the metainfo
        # drives software-center visibility; broken syntax means a hidden
        # launcher or an app invisible in GNOME Software / Discover. Fail hard.
        run: |
          desktop-file-validate dist/desktop/io.github.thecleaners.qiftop.desktop
          desktop-file-validate dist/desktop/io.github.thecleaners.qiftop.nqiftop.desktop
          appstreamcli validate --no-net dist/desktop/io.github.thecleaners.qiftop.metainfo.xml

      - name: lintian
        working-directory: build
        # Fail on errors only — suppressed tags are cosmetic items we've
        # consciously deferred (no man page, no changelog.Debian, no
        # upstream copyright file; maintainer-script-calls-systemctl is
        # explicit by design for the on-demand DBus daemon). The
        # unsuppressed set still catches real breakage (bad shebang,
        # broken symlink, depends-on-nonexistent-package, unstripped
        # binaries, malformed Description).
        run: |
          lintian --fail-on error --suppress-tags \
            no-manual-page,no-changelog,changelog-file-missing-in-native-package,no-copyright-file,extended-description-is-empty,helper-templates-in-copyright,maintainer-script-calls-systemctl \
            *.deb

      - name: Smoke install in clean container
        working-directory: build
        # Ubuntu 24.04 container, same as the release target. Verifies:
        #   - dpkg dependency closure (apt resolves everything)
        #   - postinst runs without error
        #   - both binaries are on PATH and report --version
        # We can't easily exercise the DBus daemon inside a stock container
        # (no systemd PID 1) — that's covered by test_agent_integration.
        run: |
          docker run --rm -v "$PWD:/work" -w /work ubuntu:24.04 bash -euxc '
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq
            apt-get install -y -qq ./libqiftop0_*.deb ./qiftop-agent_*.deb ./qiftop_*.deb ./nqiftop_*.deb
            QT_QPA_PLATFORM=offscreen qiftop --version
            qiftop-agent --version
            nqiftop --version
            # postinst should have created the netdev group:
            getent group netdev
            # systemd unit file (CPack default install dir is /lib/systemd):
            test -f /lib/systemd/system/qiftop-agent.service \
              || test -f /usr/lib/systemd/system/qiftop-agent.service
            # nft conntrack shim should be present:
            test -f /usr/share/qiftop/qiftop-conntrack.nft
          '

