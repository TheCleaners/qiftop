name: clang-tidy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: clang-tidy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clang-tidy:
    name: clang-tidy (enforced baseline)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install build + tidy dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++ pkg-config \
            wget lsb-release software-properties-common gnupg \
            qt6-base-dev qt6-base-dev-tools \
            libgl1-mesa-dev \
            libnl-3-dev libnl-route-3-dev \
            libnetfilter-conntrack-dev \
            libncurses-dev \
            dbus-x11

      # Pin clang-tidy to a known LLVM version via apt.llvm.org so the gate
      # matches local dev and doesn't drift with whatever the runner ships.
      - name: Install pinned clang-tidy (apt.llvm.org)
        env:
          LLVM_VERSION: "22"
        run: |
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh "${LLVM_VERSION}"
          sudo apt-get install -y clang-tidy-"${LLVM_VERSION}"
          # Let the wrapper find the parallel runner + the pinned binary.
          if command -v "run-clang-tidy-${LLVM_VERSION}" >/dev/null; then
            sudo ln -sf "$(command -v run-clang-tidy-${LLVM_VERSION})" /usr/local/bin/run-clang-tidy
          fi
          echo "CLANG_TIDY=clang-tidy-${LLVM_VERSION}" >> "$GITHUB_ENV"
          clang-tidy-"${LLVM_VERSION}" --version

      - name: Configure compilation database
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DQIFTOP_BUILD_TESTS=OFF \
            -DQIFTOP_BUILD_BENCHMARKS=ON \
            -DQIFTOP_AUTO_PACKAGE=OFF

      # clang-tidy needs the AUTOMOC-generated `*.moc` includes to exist before
      # it analyzes any TU that `#include`s one. Build the real top-level
      # targets rather than a hand-maintained list of `*_autogen` targets — the
      # old list rotted the moment a new bench was added (bench_pipeline_tick's
      # .moc went missing and reddened the gate). The `benchmarks` aggregate
      # target depends on every bench, and the app targets pull in all of
      # src/ + libqiftop, so this stays correct as targets come and go.
      - name: Build targets (generates all moc includes)
        run: |
          cmake --build build --parallel --target \
            qiftop qiftop-agent nqiftop check_qiftop benchmarks

      - name: Run clang-tidy gate
        run: scripts/run-clang-tidy.sh --gate build
