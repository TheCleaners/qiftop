# Configuration for GitHub's auto-generated release notes.
# See: https://docs.github.com/en/repositories/releasing-projects-on-github/
#      automatically-generated-release-notes#configuration-options
changelog:
  exclude:
    labels:
      - ignore-for-release
      - dependencies
    authors:
      - dependabot
      - github-actions
  categories:
    - title: 💥 Breaking changes
      labels:
        - breaking
        - breaking-change
    - title: 🚀 Features
      labels:
        - feature
        - enhancement
    - title: 🐛 Fixes
      labels:
        - bug
        - fix
    - title: 📦 Packaging & build
      labels:
        - packaging
        - build
        - ci
    - title: 📚 Documentation
      labels:
        - documentation
        - docs
    - title: 🧰 Maintenance
      labels:
        - chore
        - refactor
    - title: Other
      labels:
        - "*"
